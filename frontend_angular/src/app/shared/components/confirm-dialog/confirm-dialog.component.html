<div class="p-6 max-w-sm">
  <div class="flex flex-col items-center text-center">
    <div
      class="w-12 h-12 rounded-full flex items-center justify-center mb-4"
      [ngClass]="iconBgClass"
    >
      <mat-icon [ngClass]="iconClass" class="!text-2xl">{{ icon }}</mat-icon>
    </div>
    <h2 class="text-lg font-semibold text-surface-900 mb-2">
      {{ data.title }}
    </h2>
    <p class="text-sm text-surface-500 leading-relaxed">{{ data.message }}</p>
  </div>
  <div class="flex items-center gap-3 mt-6">
    <button
      class="flex-1 px-4 py-2.5 text-sm font-medium text-surface-700 bg-white border border-surface-300 rounded-lg hover:bg-surface-50 transition-colors"
      (click)="onCancel()"
    >
      {{ data.cancelText || "Cancel" }}
    </button>
    <button
      class="flex-1 px-4 py-2.5 text-sm font-medium text-white bg-red-600 rounded-lg hover:bg-red-700 transition-colors"
      (click)="onConfirm()"
    >
      {{ data.confirmText || "Confirm" }}
    </button>
  </div>
</div>
