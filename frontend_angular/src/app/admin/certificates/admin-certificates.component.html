<div class="space-y-6 animate-fade-in">
  <div class="flex items-center gap-2 text-sm text-surface-600 mb-2">
    <a
      routerLink="/admin/dashboard"
      class="hover:text-surface-900 transition-colors"
      >Admin</a
    >
    <span class="material-icons-outlined text-base">chevron_right</span>
    <span class="text-surface-900 font-medium">Certificates</span>
  </div>

  <app-page-header
    title="Certificate Management"
    subtitle="View and manage all employee certificates."
  ></app-page-header>

  <app-skeleton *ngIf="loading" type="card" [count]="1"></app-skeleton>

  <div *ngIf="!loading && certificates.length > 0" class="card">
    <div class="overflow-x-auto">
      <table mat-table [dataSource]="certificates" class="w-full">
        <ng-container matColumnDef="employee">
          <th mat-header-cell *matHeaderCellDef>Employee</th>
          <td mat-cell *matCellDef="let cert">
            <div class="font-medium text-surface-900">
              {{ cert.employeeName }}
            </div>
          </td>
        </ng-container>

        <ng-container matColumnDef="course">
          <th mat-header-cell *matHeaderCellDef>Course</th>
          <td mat-cell *matCellDef="let cert">
            <div class="text-sm text-surface-600">{{ cert.courseTitle }}</div>
          </td>
        </ng-container>

        <ng-container matColumnDef="score">
          <th mat-header-cell *matHeaderCellDef>Score</th>
          <td mat-cell *matCellDef="let cert">
            <div class="text-sm font-medium">{{ cert.score }}%</div>
          </td>
        </ng-container>

        <ng-container matColumnDef="issuedAt">
          <th mat-header-cell *matHeaderCellDef>Issued</th>
          <td mat-cell *matCellDef="let cert">
            <div class="text-sm text-surface-600">
              {{ cert.issuedAt | date: "mediumDate" }}
            </div>
          </td>
        </ng-container>

        <ng-container matColumnDef="status">
          <th mat-header-cell *matHeaderCellDef>Status</th>
          <td mat-cell *matCellDef="let cert">
            <span
              [ngClass]="getStatusBadgeClass(cert)"
              class="px-2 py-1 rounded-full text-xs font-semibold flex items-center gap-1 w-fit"
            >
              <span class="material-icons-outlined text-base">{{
                cert.revoked ? "cancel" : "verified"
              }}</span>
              {{ getStatusText(cert) }}
            </span>
          </td>
        </ng-container>

        <ng-container matColumnDef="actions">
          <th mat-header-cell *matHeaderCellDef>Actions</th>
          <td mat-cell *matCellDef="let cert" class="space-x-2">
            <button
              mat-icon-button
              matTooltip="Revoke"
              *ngIf="!cert.revoked"
              (click)="revokeCertificate(cert)"
              [disabled]="actionInProgress[cert.id]"
              class="text-red-500 hover:bg-red-50"
            >
              <span class="material-icons-outlined">block</span>
            </button>
            <button
              mat-icon-button
              matTooltip="Restore"
              *ngIf="cert.revoked"
              (click)="unrevokeCertificate(cert)"
              [disabled]="actionInProgress[cert.id]"
              class="text-green-500 hover:bg-green-50"
            >
              <span class="material-icons-outlined">restore</span>
            </button>
          </td>
        </ng-container>

        <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
        <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
      </table>
    </div>

    <mat-paginator
      [length]="totalElements"
      [pageSize]="pageSize"
      [pageSizeOptions]="[5, 10, 20]"
      (page)="onPageChange($event)"
      showFirstLastButtons
      class="border-t border-surface-200"
    ></mat-paginator>
  </div>
</div>
